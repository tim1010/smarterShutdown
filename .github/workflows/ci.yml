name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same branch — saves CI minutes when you push twice in a row.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Build & test
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore SmarterShutdown.sln

      # UseSharedCompilation=false avoids a Roslyn build-server file-lock race in parallel
      # builds that produces flaky CS2012 errors on net8.0-windows multi-project solutions.
      # The penalty is a slightly slower build — fine for CI, not worth fighting.
      - name: Build
        run: dotnet build SmarterShutdown.sln --configuration Release --no-restore -p:UseSharedCompilation=false

      - name: Test
        run: >
          dotnet test SmarterShutdown.sln
          --configuration Release
          --no-build
          --logger "trx;LogFileName=test-results.trx"
          --results-directory TestResults

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: TestResults/**/*.trx
          if-no-files-found: warn
